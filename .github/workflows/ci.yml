name: CI

# ─── Triggers ────────────────────────────────────────────────────────────────
# Runs on every PR targeting main, and on every direct push to main.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress CI runs for the same PR when a new commit is pushed
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# ─── Jobs ────────────────────────────────────────────────────────────────────
jobs:

  # ── 1. Lint ────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  # ── 2. Build ───────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    env:
      VITE_SUPABASE_URL:      ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
      VITE_AUTH_ENABLED:      false
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Vite build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  # ── 3. Playwright E2E ──────────────────────────────────────────────────────
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [lint, build]   # Only run if lint + build pass
    timeout-minutes: 60    # Browser install (~10 min) + platform.spec.js x2 projects (~25 min)
    env:
      VITE_SUPABASE_URL:      ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
      VITE_AUTH_ENABLED:      false
      CI:                     true
      SKIP_BUILD:             true   # dist/ downloaded below; skip redundant rebuild in playwright.config.js
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      # Cache Playwright Chromium binary by Playwright version (keyed by package-lock.json).
      # System-level deps (libgtk etc.) are installed separately and always fresh.
      - name: Cache Playwright Chromium binary
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: playwright-chromium-${{ runner.os }}-

      - name: Install Playwright system dependencies
        run: npx playwright install-deps chromium

      - name: Install Playwright Chromium browser
        run: npx playwright install chromium

      - name: Run Playwright tests
        run: npx playwright test --project=desktop-chrome --project=mobile-chrome

      - name: Upload test report
        if: always()   # Upload even on failure so you can inspect what broke
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e-report/
          retention-days: 14

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-screenshots
          path: test-results/
          retention-days: 7
