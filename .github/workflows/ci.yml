name: CI

# ─── Triggers ────────────────────────────────────────────────────────────────
# Runs on every PR targeting main or v2, and on every direct push to either branch.
on:
  push:
    branches: [main, v2]
  pull_request:
    branches: [main, v2]

# Cancel in-progress CI runs for the same PR when a new commit is pushed
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# ─── Jobs ────────────────────────────────────────────────────────────────────
jobs:

  # ── 1. Security ────────────────────────────────────────────────────────────
  security:
    name: Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Fail CI on high or critical npm vulnerabilities (CI-1)
      - name: npm audit
        run: npm audit --audit-level=high

      # Detect Rolldown TDZ trap — circular imports that cause production crashes (CODE-1)
      - name: Circular dependency check
        run: npx madge --circular src/

      # Guard against Windows UTF-16 / CRLF encoding corruption in SQL files (LOW-5)
      # sql/ts/js files must be UTF-8 only — non-ASCII outside those ranges caused migration 154's bug
      - name: Encoding check (no non-UTF-8 bytes in SQL/TS/JS)
        run: |
          find supabase/functions src -type f \( -name "*.sql" -o -name "*.ts" -o -name "*.js" -o -name "*.jsx" \) \
            | xargs grep -rlP '[^\x00-\x7F\xC2-\xFD][\x80-\xBF]' 2>/dev/null \
            | grep -v node_modules \
            | (grep . && echo "❌ Non-UTF-8 bytes detected in the above files" && exit 1) \
            || echo "✅ All source files are valid UTF-8"

      # Ensure Edge Functions are deployed whenever their code changes (DEPLOY-1)
      - name: Function drift check
        run: npm run check:drift

  # ── 2. Lint ────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  # ── 3. Build ───────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    env:
      VITE_SUPABASE_URL:      ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
      VITE_AUTH_ENABLED:      false
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Vite build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  # ── 4. Unit / integration tests (B2 — TEST-1) ─────────────────────────────
  # Runs the RPC regression tests against an ephemeral Postgres — no prod reads.
  # Parallel to security + lint; gated before E2E.
  # NOTE: these tests require supabase/schema.sql to exist (Phase A1).
  # Until A1 is done the job is skipped (schema.sql absent → setup.js exits 1
  # but we catch that gracefully).
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: [security, lint]
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Load schema (skip if schema.sql not yet generated — Phase A1)
        run: |
          if [ -f supabase/schema.sql ]; then
            psql "$TEST_DATABASE_URL" < supabase/schema.sql
            echo "✅ schema.sql loaded"
          else
            echo "⚠️  supabase/schema.sql not found — unit tests will be skipped until Phase A1 produces it."
            echo "SKIP_UNIT_TESTS=true" >> $GITHUB_ENV
          fi

      - name: Load seed
        if: env.SKIP_UNIT_TESTS != 'true'
        run: psql "$TEST_DATABASE_URL" < tests/unit/seed.sql

      - name: Run unit tests
        if: env.SKIP_UNIT_TESTS != 'true'
        run: npm run test:unit

  # ── 5. Playwright E2E ──────────────────────────────────────────────────────
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [security, lint, build, unit-tests]   # Only run if all prior gates pass
    timeout-minutes: 60    # Browser install (~10 min) + platform.spec.js x2 projects (~25 min)
    env:
      VITE_SUPABASE_URL:      ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
      VITE_AUTH_ENABLED:      false
      CI:                     true
      SKIP_BUILD:             true   # dist/ downloaded below; skip redundant rebuild in playwright.config.js
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      # Cache Playwright Chromium binary by Playwright version (keyed by package-lock.json).
      # System-level deps (libgtk etc.) are installed separately and always fresh.
      - name: Cache Playwright Chromium binary
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: playwright-chromium-${{ runner.os }}-

      - name: Install Playwright system dependencies
        run: npx playwright install-deps chromium

      - name: Install Playwright Chromium browser
        run: npx playwright install chromium

      - name: Run Playwright tests
        run: npx playwright test --project=desktop-chrome --project=mobile-chrome

      - name: Upload test report
        if: always()   # Upload even on failure so you can inspect what broke
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e-report/
          retention-days: 14

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-screenshots
          path: test-results/
          retention-days: 7
