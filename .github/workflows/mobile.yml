name: Mobile Build

# Runs on pushes to main and any antigravity/* feature branches.
# Validates that both native projects compile after a web build + cap sync.
# Does NOT sign or upload — signing requires certificates stored as secrets (Phase 4).
on:
  push:
    branches: [main, 'antigravity/**']
  pull_request:
    branches: [main]

concurrency:
  group: mobile-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ── 1. Build web + sync to native ─────────────────────────────────────────
  # Both native jobs download this artifact and run cap sync locally.
  build-web:
    name: Web Build & Cap Sync Prep
    runs-on: ubuntu-latest
    env:
      VITE_SUPABASE_URL:      ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
      VITE_AUTH_ENABLED:      false
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build web app
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: dist/
          retention-days: 1

  # ── 2. iOS — simulator build (no signing) ─────────────────────────────────
  build-ios:
    name: iOS Build (Simulator)
    runs-on: macos-latest
    needs: build-web
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Download web dist
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: dist/

      - name: Sync Capacitor → iOS
        run: npx cap sync ios

      - name: Build for iOS Simulator (no signing)
        run: |
          xcodebuild \
            -project ios/App/App.xcodeproj \
            -scheme App \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build

  # ── 3. Android — debug APK build (no signing) ─────────────────────────────
  build-android:
    name: Android Build (Debug APK)
    runs-on: ubuntu-latest
    needs: build-web
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin

      - name: Install dependencies
        run: npm install

      - name: Download web dist
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: dist/

      - name: Sync Capacitor → Android
        run: npx cap sync android

      - name: Build debug APK
        run: cd android && chmod +x gradlew && ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
