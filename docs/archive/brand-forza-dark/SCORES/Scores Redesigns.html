<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FORZAKIT — Scores Redesigns</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Archivo:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="squad-shared.css">
<style>
  @keyframes fkPulse { 0%,100%{opacity:1} 50%{opacity:.35} }
  button:focus{outline:none}
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="squad-data.jsx"></script>
<script type="text/babel" src="final-squad-desktop.jsx"></script>
<script type="text/babel" src="scores-data.jsx"></script>
<script type="text/babel" src="scores-screens.jsx"></script>

<script type="text/babel" data-presets="react">
function App(){
  return (
    <DesignCanvas
      title="FORZAKIT · Scores Redesigns"
      subtitle="Three takes on Match Centre. Same chrome, three approaches to date + competition grouping. All paginated by Gameweek — no more infinite scroll."
    >
      <DCSection id="system" title="Design notes">
        <DCArtboard id="notes" label="Design rationale" width={1200} height={420} background="#0F1218">
          <div style={{padding:'36px 48px',color:'var(--paper)',background:'#0F1218',fontFamily:'Archivo,sans-serif',height:'100%',display:'flex',flexDirection:'column',gap:14}}>
            <div className="eyebrow">SYSTEM · Match Centre</div>
            <div className="display" style={{fontSize:34,letterSpacing:'-0.02em'}}>Pager, not a treadmill.</div>
            <div style={{display:'grid',gridTemplateColumns:'repeat(4, 1fr)',gap:24,marginTop:8,fontSize:13,lineHeight:1.55,color:'#C9CDD3'}}>
              <div>
                <div className="mono" style={{fontSize:10,color:'var(--cyan)',marginBottom:6}}>PAGINATION</div>
                A Gameweek pager replaces infinite scroll. One GW per view; arrows step forward/back.
              </div>
              <div>
                <div className="mono" style={{fontSize:10,color:'var(--cyan)',marginBottom:6}}>GROUPING</div>
                Date and Competition are not either-or. V1 toggles them; V2 uses competition as the rail, date as the body; V3 lets the week breathe.
              </div>
              <div>
                <div className="mono" style={{fontSize:10,color:'var(--cyan)',marginBottom:6}}>VOCABULARY</div>
                Reuses the FORZAKIT chrome you already shipped — sidebar, mono eyebrow, Archivo Black title, sub-tabs, 3px tone bar for sections.
              </div>
              <div>
                <div className="mono" style={{fontSize:10,color:'var(--cyan)',marginBottom:6}}>STATUS</div>
                One system. FT mono pill, KO clock-time, LIVE = red dot + minute, with a 2px red left-border row treatment.
              </div>
            </div>
          </div>
        </DCArtboard>
      </DCSection>

      <DCSection id="v1" title="V1 — Match Centre (canonical)">
        <DCArtboard id="v1-d" label="Desktop · View toggle + GW pager + comp chips" width={1280} height={840} background="#06070A">
          <ScoresV1/>
        </DCArtboard>
        <DCArtboard id="v1-m" label="Mobile · Single column" width={390} height={840} background="#06070A">
          <ScoresMobile/>
        </DCArtboard>
      </DCSection>

      <DCSection id="v2" title="V2 — Split rail (competition as primary)">
        <DCArtboard id="v2-d" label="Desktop · Competition rail + date-grouped body" width={1280} height={840} background="#06070A">
          <ScoresV2/>
        </DCArtboard>
      </DCSection>

      <DCSection id="v3" title="V3 — Week grid (calendar layout)">
        <DCArtboard id="v3-d" label="Desktop · One column per day, tone-coded cards" width={1280} height={840} background="#06070A">
          <ScoresV3/>
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
