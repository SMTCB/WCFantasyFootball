<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FORZAKIT — League Hub · Mobile</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Archivo:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700;1,900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="src/squad-shared.css">
<style>
  @keyframes fkPulse { 0%,100%{opacity:1} 50%{opacity:.35} }
  button:focus{outline:none}
  .fk-rule { height:1px; background:var(--rule); border:0; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="src/league-data.jsx"></script>
<script type="text/babel" src="src/league-shared.jsx"></script>
<script type="text/babel" src="src/league-mobile-shared.jsx"></script>
<script type="text/babel" src="src/league-mobile-leaderboard.jsx"></script>
<script type="text/babel" src="src/league-mobile-frontpage.jsx"></script>
<script type="text/babel" src="src/league-mobile-bets.jsx"></script>
<script type="text/babel" src="src/league-mobile-auctions.jsx"></script>
<script type="text/babel" src="src/league-mobile-chat-stats.jsx"></script>

<script type="text/babel" data-presets="react">
function App(){
  return (
    <DesignCanvas
      title="FORZAKIT · League Hub — Mobile"
      subtitle="Mobile versions of the seven hub tabs plus the four drill-ins. 390px design width."
    >
      <DCSection id="mobile-tabs" title="Hub tabs — mobile">
        <DCArtboard id="m-leaderboard" label="LEADERBOARD" width={390} height={1280} background="#06070A"><MobLeaderboard/></DCArtboard>
        <DCArtboard id="m-frontpage" label="FRONTPAGE" width={390} height={1900} background="#06070A"><MobFrontpage/></DCArtboard>
        <DCArtboard id="m-bets" label="BETS" width={390} height={1500} background="#06070A"><MobBets/></DCArtboard>
        <DCArtboard id="m-betting" label="BETTING" width={390} height={1280} background="#06070A"><MobBetting/></DCArtboard>
        <DCArtboard id="m-auctions" label="AUCTIONS" width={390} height={1700} background="#06070A"><MobAuctions/></DCArtboard>
        <DCArtboard id="m-chat" label="CHAT" width={390} height={1100} background="#06070A"><MobChat/></DCArtboard>
        <DCArtboard id="m-stats" label="STATS" width={390} height={1400} background="#06070A"><MobStats/></DCArtboard>
      </DCSection>
      <DCSection id="mobile-drillins" title="Drill-ins — mobile">
        <DCArtboard id="m-manager" label="MANAGER PROFILE" width={390} height={1500} background="#06070A"><MobManagerProfile id="rai"/></DCArtboard>
        <DCArtboard id="m-pick" label="MAKE PICK" width={390} height={1100} background="#06070A"><MobMakePick/></DCArtboard>
        <DCArtboard id="m-auction" label="AUCTION DETAIL" width={390} height={1500} background="#06070A"><MobAuctionDetail/></DCArtboard>
        <DCArtboard id="m-article" label="FORZA TIMES · ARTICLE" width={390} height={1400} background="#06070A"><MobArticle/></DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
