<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<body>
<div id="root"></div>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="squad-data.jsx"></script>

<script type="text/babel" data-presets="react">
// ════════════════════════════════════════════════════════════════════
//  FORZAKIT · Player Modals v2
//  [1] Stats Dashboard — STATS ↗ button in player history row
//  [2] Player Action Popup — Option A (with context) + B (minimal)
//  PLUGIN comments = integration points for Claude Code
// ════════════════════════════════════════════════════════════════════

const POS_COLOR = { GK:'var(--purple)', DEF:'var(--cyan)', MID:'var(--gold)', FWD:'var(--danger)' };
const STATUS_C  = { fit:'var(--positive)', doubt:'var(--gold)', out:'var(--danger)' };
const STATUS_L  = { fit:'AVAILABLE', doubt:'DOUBTFUL', out:'INJURED' };

// Shared mono style — spread as {...MO} in component styles
const MO = { fontFamily:'JetBrains Mono,monospace', textTransform:'uppercase', letterSpacing:'.14em' };

// ── POSITION-SPECIFIC STATS CONFIG ───────────────────────────────
// PLUGIN: Each entry maps to a stat field.
//   derive(gwHistory) → computed locally from gwHistory array (always available)
//   derive = null     → must come from your stats provider (mark as PLUGIN in UI)
//   pluginKey         → the exact key to expect from provider API
//
// Adjust stat selection per position to match what your data layer supports.
const POS_STATS_CFG = {
  GK: [
    { label:'CLEAN SHEETS', derive: h => h.filter(r => r.cleanSheet).length,             pluginKey: null },
    { label:'SAVES',        derive: null, pluginKey:'player.stats.saves'                              },
    { label:'PEN SAVES',    derive: null, pluginKey:'player.stats.penaltySaves'                       },
    { label:'CONCEDED',     derive: null, pluginKey:'player.stats.goalsConceded'                      },
  ],
  DEF: [
    { label:'CLEAN SHEETS', derive: h => h.filter(r => r.cleanSheet).length,             pluginKey: null },
    { label:'GOALS',        derive: h => h.reduce((s,r) => s+r.goals, 0),                pluginKey: null },
    { label:'ASSISTS',      derive: h => h.reduce((s,r) => s+r.assists, 0),              pluginKey: null },
    { label:'TACKLES',      derive: null, pluginKey:'player.stats.tackles'                            },
  ],
  MID: [
    { label:'GOALS',        derive: h => h.reduce((s,r) => s+r.goals, 0),                pluginKey: null },
    { label:'ASSISTS',      derive: h => h.reduce((s,r) => s+r.assists, 0),              pluginKey: null },
    { label:'KEY PASSES',   derive: null, pluginKey:'player.stats.keyPasses'                          },
    { label:'CHANCES',      derive: null, pluginKey:'player.stats.chancesCreated'                     },
  ],
  FWD: [
    { label:'GOALS',        derive: h => h.reduce((s,r) => s+r.goals, 0),                pluginKey: null },
    { label:'ASSISTS',      derive: h => h.reduce((s,r) => s+r.assists, 0),              pluginKey: null },
    { label:'SHOTS ON TGT', derive: null, pluginKey:'player.stats.shotsOnTarget'                      },
    { label:'xG',           derive: null, pluginKey:'player.stats.xG'                                 },
  ],
};

// ── MOCK DATA ─────────────────────────────────────────────────────
// PLUGIN: replace with real player objects from your store

const BALOGUN = {
  name:'FOLARIN BALOGUN', lastName:'BALOGUN', position:'FWD',
  country:'UNITED STATES', club:'MON', price:'€7M',
  status:'fit', trend:'up', isLocked:true, ownership:14.2,
};

// PLUGIN: player.gwHistory — one object per played gameweek
const BALOGUN_GW = [
  { gw:'R1', fixture:'UNI vs PAR', isHome:true,  minutes:72, goals:2, assists:0, cleanSheet:false, yellowCards:0, redCards:0, ownGoals:0, penaltyMiss:0, bonusPts:0, totalPts:10 },
  { gw:'R2', fixture:'PAR vs UNI', isHome:false, minutes:90, goals:0, assists:1, cleanSheet:false, yellowCards:1, redCards:0, ownGoals:0, penaltyMiss:0, bonusPts:0, totalPts:4  },
  { gw:'R3', fixture:'MON vs LYN', isHome:true,  minutes:90, goals:1, assists:1, cleanSheet:false, yellowCards:0, redCards:0, ownGoals:0, penaltyMiss:0, bonusPts:3, totalPts:12 },
  { gw:'R4', fixture:'BOR vs MON', isHome:false, minutes:60, goals:0, assists:0, cleanSheet:false, yellowCards:0, redCards:0, ownGoals:0, penaltyMiss:0, bonusPts:0, totalPts:2  },
  { gw:'R5', fixture:'MON vs NIC', isHome:true,  minutes:45, goals:1, assists:0, cleanSheet:false, yellowCards:0, redCards:0, ownGoals:0, penaltyMiss:0, bonusPts:0, totalPts:5  },
];

const VDV = {
  name:'MICKY VAN DE VEN', lastName:'VAN DE VEN', position:'DEF',
  country:'NETHERLANDS', club:'TOT', price:'€5.5M',
  status:'fit', trend:'neutral', isLocked:false, isCaptain:false,
  ownership:22.8,
  nextFixture:'TOT vs CHE', // PLUGIN: player.nextFixture
  fixtureDiff:3,             // PLUGIN: player.fixtureDifficulty (1=easy, 5=hard)
};
const VDV_FORM = [7, 2, 9, 6, 4]; // PLUGIN: player.recentForm — last N GWs, oldest→newest

// ── SCORING ENGINE ────────────────────────────────────────────────
// PLUGIN: replace with function reading from league.scoringConfig
function buildBreakdown(gw, pos) {
  const rows = [];
  if (gw.minutes > 0) {
    const p = gw.minutes >= 60 ? 2 : 1; // PLUGIN: league.minuteThreshold
    rows.push({ label:`APPEARANCE  (${gw.minutes}')`, pts:p, kind:'pos' });
  }
  const gPts = {GK:6,DEF:6,MID:5,FWD:4}[pos] || 4; // PLUGIN: league.goalPoints[pos]
  if (gw.goals > 0)    rows.push({ label:`GOALS × ${gw.goals}  (${pos} = ${gPts} PTS EACH)`, pts:gw.goals*gPts, kind:'pos' });
  if (gw.assists > 0)  rows.push({ label:`ASSISTS × ${gw.assists}`, pts:gw.assists*3, kind:'pos' }); // PLUGIN: league.assistPoints
  if (gw.cleanSheet) {
    const cp = {GK:4,DEF:4,MID:1,FWD:0}[pos]||0; // PLUGIN: league.cleanSheetPoints[pos]
    if (cp > 0) rows.push({ label:'CLEAN SHEET', pts:cp, kind:'pos' });
  }
  if (gw.bonusPts > 0)    rows.push({ label:'BONUS POINTS', pts:gw.bonusPts, kind:'bonus' }); // PLUGIN: league.bonusEnabled
  if (gw.yellowCards > 0) rows.push({ label:`YELLOW CARD × ${gw.yellowCards}`, pts:gw.yellowCards*-1, kind:'neg' });
  if (gw.redCards > 0)    rows.push({ label:'RED CARD', pts:-3, kind:'neg' });
  if (gw.ownGoals > 0)    rows.push({ label:`OWN GOAL × ${gw.ownGoals}`, pts:gw.ownGoals*-2, kind:'neg' });
  if (gw.penaltyMiss > 0) rows.push({ label:'PENALTY MISS', pts:-2, kind:'neg' });
  return rows;
}

// ── ATOMS ─────────────────────────────────────────────────────────
function PosBadge({ pos, small }) {
  const c = POS_COLOR[pos]||'var(--mute)';
  return <div style={{ flexShrink:0, width:small?36:44, height:small?20:24, border:`1.5px solid ${c}`, color:c,
    fontFamily:'Archivo Black,sans-serif', fontSize:small?9:11, letterSpacing:'.04em',
    display:'flex', alignItems:'center', justifyContent:'center' }}>{pos}</div>;
}
function Dot({ status }) {
  return <span style={{ display:'inline-block', width:7, height:7, borderRadius:'50%',
    background:STATUS_C[status]||'var(--mute)', flexShrink:0 }} />;
}
function FormBars({ form, maxH=36 }) {
  const max = Math.max(...form, 1);
  return (
    <div style={{ display:'flex', gap:3, alignItems:'flex-end' }}>
      {form.map((p,i) => (
        <div key={i} style={{ display:'flex', flexDirection:'column', alignItems:'center', gap:3 }}>
          <div style={{ width:20, height:Math.max(3,(p/max)*maxH),
            background:p>=8?'var(--positive)':p>=4?'var(--cyan)':'var(--mute)' }} />
          <div style={{ ...MO, fontSize:8, color:'var(--mute)', letterSpacing:'.06em' }}>{p}</div>
        </div>
      ))}
    </div>
  );
}
function MiniChart({ history }) {
  if (!history?.length) return <div style={{ ...MO, fontSize:9, color:'var(--mute)' }}>— NO DATA YET —</div>;
  const max = Math.max(...history.map(r=>r.totalPts), 1);
  return (
    <div style={{ display:'flex', gap:4, alignItems:'flex-end', height:44 }}>
      {history.map((r,i) => (
        <div key={i} style={{ flex:1, display:'flex', flexDirection:'column', alignItems:'center', gap:3, justifyContent:'flex-end' }}>
          <div style={{ width:'100%', height:Math.max(3,(r.totalPts/max)*32),
            background:r.totalPts>=10?'var(--positive)':r.totalPts>=5?'var(--cyan)':'var(--mute)' }} />
          <div style={{ ...MO, fontSize:8, color:'var(--mute)', letterSpacing:'.06em' }}>{r.gw}</div>
        </div>
      ))}
    </div>
  );
}

// ── POSITION STATS STRIP ─────────────────────────────────────────
// Shows up to 4 position-specific stats. Computable ones derive from gwHistory;
// others show — with a PLUGIN key so Claude Code knows which API field to connect.
function PosStatsStrip({ position, gwHistory, compact }) {
  const cfg = POS_STATS_CFG[position] || [];
  const posC = POS_COLOR[position];
  return (
    <div style={{ display:'flex', borderBottom:'1px solid var(--rule)', flexShrink:0 }}>
      {/* position label cell */}
      <div style={{ flex:'0 0 88px', padding:compact?'7px 12px':'10px 16px',
        borderRight:'1px solid var(--rule)',
        display:'flex', flexDirection:'column', justifyContent:'center', gap:2 }}>
        <div style={{ ...MO, fontSize:7, color:posC, letterSpacing:'.22em' }}>POS STATS</div>
        <div style={{ fontFamily:'Archivo Black', fontSize:compact?11:14, color:posC }}>{position}</div>
      </div>
      {/* stat cells */}
      {cfg.map((s, i) => {
        const val = s.derive ? s.derive(gwHistory) : null;
        const hasVal = val !== null;
        return (
          <div key={i} style={{ flex:1, padding:compact?'7px 10px':'10px 14px',
            borderRight:i<3?'1px solid var(--rule)':'none' }}>
            <div style={{ ...MO, fontSize:7, color:'var(--mute)', marginBottom:compact?2:3, letterSpacing:'.18em' }}>{s.label}</div>
            <div style={{ fontFamily:'Archivo Black', fontSize:compact?14:18, letterSpacing:'-0.02em',
              color:hasVal?'var(--paper)':'rgba(139,149,161,.35)' }}>
              {hasVal ? val : '—'}
            </div>
            {/* PLUGIN: marker for stats that require external provider data */}
            {!hasVal && s.pluginKey && (
              <div style={{ ...MO, fontSize:7, color:'rgba(0,180,216,.45)', letterSpacing:'.08em', marginTop:2, lineHeight:1.4 }}>
                {s.pluginKey}
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

// ── TRIGGER CONTEXT ───────────────────────────────────────────────
function TriggerContext() {
  return (
    <div style={{ width:'100%', height:'100%', background:'var(--ink)', color:'var(--paper)',
      fontFamily:'Archivo,sans-serif', display:'flex', flexDirection:'column', justifyContent:'center' }}>
      {/* player header */}
      <div style={{ display:'flex', alignItems:'center', gap:14, padding:'10px 20px', borderBottom:'1px solid var(--rule)' }}>
        <PosBadge pos="FWD" />
        <div style={{ flex:1 }}>
          <div style={{ display:'flex', alignItems:'center', gap:8 }}>
            <span style={{ fontFamily:'Archivo Black', fontSize:15, letterSpacing:'-0.01em' }}>FOLARIN BALOGUN</span>
            <span style={{ ...MO, fontSize:8, color:'var(--positive)' }}>▲</span>
          </div>
          <div style={{ display:'flex', alignItems:'center', gap:6, marginTop:2 }}>
            <Dot status="fit" />
            <span style={{ ...MO, fontSize:9, color:'var(--mute)' }}>UNITED STATES</span>
            {[1,2,3,4,5].map(i=><div key={i} style={{ width:18,height:10,background:'var(--rule)',borderRadius:1 }}/>)}
          </div>
        </div>
        <div style={{ display:'flex', alignItems:'center', gap:12 }}>
          <span style={{ fontFamily:'Archivo Black', fontSize:16 }}>€7M</span>
          <span style={{ ...MO, fontSize:9, color:'var(--mute)', border:'1px solid var(--rule)', padding:'3px 7px' }}>LOCKED</span>
        </div>
      </div>
      {/* table header */}
      <div style={{ display:'grid', gridTemplateColumns:'56px 1fr 70px 52px 52px 60px 96px',
        padding:'6px 20px', borderBottom:'1px solid var(--rule)', ...MO, fontSize:9, color:'var(--mute)' }}>
        <span>GW</span><span>FIXTURE</span><span>MIN</span>
        <span style={{ color:'var(--positive)' }}>G</span><span style={{ color:'var(--cyan)' }}>A</span>
        <span style={{ textAlign:'right' }}>PTS</span><span></span>
      </div>
      {/* data row */}
      <div style={{ display:'grid', gridTemplateColumns:'56px 1fr 70px 52px 52px 60px 96px',
        padding:'9px 20px', borderBottom:'1px solid var(--rule)', alignItems:'center' }}>
        <span style={{ ...MO, fontSize:10, color:'var(--mute)' }}>R1</span>
        <span style={{ fontFamily:'Archivo', fontSize:12 }}>UNI vs PAR</span>
        <span style={{ ...MO, fontSize:10, color:'var(--mute)' }}>72'</span>
        <span style={{ fontFamily:'Archivo Black', fontSize:15, color:'var(--positive)' }}>2</span>
        <span style={{ fontFamily:'Archivo Black', fontSize:15, color:'var(--mute)' }}>0</span>
        <span style={{ textAlign:'right', fontFamily:'Archivo Black', fontSize:17, color:'var(--positive)' }}>10</span>
        <span></span>
      </div>
      {/* summary + NEW STATS BUTTON */}
      <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', padding:'8px 20px' }}>
        <div style={{ display:'flex', gap:10, ...MO, fontSize:9, color:'var(--mute)' }}>
          <span>1 APPS</span><span>·</span>
          <span style={{ color:'var(--positive)' }}>2G</span><span>·</span>
          <span style={{ color:'var(--cyan)' }}>0A</span><span>·</span>
          <span>10 PTS</span><span>·</span><span>AVG 10.0/GW</span>
        </div>
        {/* ← NEW BUTTON — PLUGIN: onClick opens PlayerStatsDashboard modal */}
        <button style={{ background:'transparent', border:'1px solid var(--rule)', color:'var(--cyan)',
          ...MO, fontSize:9, padding:'5px 12px',
          display:'flex', alignItems:'center', gap:6, cursor:'pointer' }}>
          STATS <span style={{ fontSize:11 }}>↗</span>
        </button>
      </div>
    </div>
  );
}

// ════════════════════════════════════════════════════════════════════
//  [1A] STATS DASHBOARD — DESKTOP
// ════════════════════════════════════════════════════════════════════
function StatsDashDesktop({ player=BALOGUN, gwHistory=BALOGUN_GW }) {
  const [sel, setSel] = React.useState(gwHistory[0]||null);
  const breakdown = sel ? buildBreakdown(sel, player.position) : [];

  const apps  = gwHistory.length;
  const goals = gwHistory.reduce((s,r)=>s+r.goals,0);
  const asts  = gwHistory.reduce((s,r)=>s+r.assists,0);
  const tot   = gwHistory.reduce((s,r)=>s+r.totalPts,0);
  const avg   = apps>0?(tot/apps).toFixed(1):'—';

  return (
    <div style={{ width:'100%', height:'100%', display:'flex', alignItems:'center', justifyContent:'center',
      background:'rgba(6,7,10,.86)', fontFamily:'Archivo,sans-serif' }}>
      <div style={{ width:900, background:'var(--ink)', border:'1px solid var(--rule)',
        display:'flex', flexDirection:'column', maxHeight:620, overflow:'hidden', color:'var(--paper)' }}>

        {/* HEADER */}
        <div style={{ display:'flex', alignItems:'center', gap:14, padding:'13px 20px',
          borderBottom:'1px solid var(--rule)', flexShrink:0 }}>
          <PosBadge pos={player.position} />
          <div style={{ flex:1, minWidth:0 }}>
            <div style={{ display:'flex', alignItems:'center', gap:8 }}>
              <span style={{ fontFamily:'Archivo Black', fontSize:18, letterSpacing:'-0.01em', textTransform:'uppercase' }}>{player.name}</span>
              {player.trend==='up'   && <span style={{ ...MO, fontSize:9, color:'var(--positive)' }}>▲</span>}
              {player.trend==='down' && <span style={{ ...MO, fontSize:9, color:'var(--danger)' }}>▼</span>}
            </div>
            <div style={{ display:'flex', alignItems:'center', gap:8, marginTop:3 }}>
              <Dot status={player.status} />
              <span style={{ ...MO, fontSize:9, color:'var(--mute)' }}>{player.country} · {player.club}</span>
              <span style={{ ...MO, fontSize:9, color:STATUS_C[player.status] }}>· {STATUS_L[player.status]}</span>
            </div>
          </div>
          <div style={{ display:'flex', alignItems:'center', gap:14, flexShrink:0 }}>
            <div style={{ textAlign:'right' }}>
              <div style={{ fontFamily:'Archivo Black', fontSize:18 }}>{player.price}</div>
              <div style={{ ...MO, fontSize:8, color:'var(--mute)', marginTop:2 }}>PRICE</div>
            </div>
            {player.isLocked && <div style={{ ...MO, fontSize:9, color:'var(--mute)', border:'1px solid var(--rule)', padding:'4px 8px' }}>LOCKED</div>}
            {/* PLUGIN: onClose */}
            <div style={{ width:24, height:24, border:'1px solid var(--rule)', color:'var(--mute)',
              display:'flex', alignItems:'center', justifyContent:'center', cursor:'pointer', fontSize:13 }}>✕</div>
          </div>
        </div>

        {/* KEY STATS STRIP */}
        <div style={{ display:'flex', borderBottom:'1px solid var(--rule)', flexShrink:0 }}>
          {[
            { label:'APPS',      val:apps,              c:'var(--paper)'    },
            { label:'GOALS',     val:goals,             c:'var(--positive)' },
            { label:'ASSISTS',   val:asts,              c:'var(--cyan)'     },
            { label:'TOTAL PTS', val:tot,               c:'var(--paper)'    },
            { label:'AVG / GW',  val:avg,               c:'var(--paper)'    },
            { label:'OWNED BY',  val:`${player.ownership}%`, c:'var(--mute)' }, // PLUGIN: player.ownershipPct
          ].map((s,i) => (
            <div key={i} style={{ flex:1, padding:'10px 14px', borderRight:i<5?'1px solid var(--rule)':'none' }}>
              <div style={{ ...MO, fontSize:8, color:'var(--mute)', marginBottom:3 }}>{s.label}</div>
              <div style={{ fontFamily:'Archivo Black', fontSize:19, letterSpacing:'-0.02em', color:s.c }}>{s.val}</div>
            </div>
          ))}
        </div>

        {/* POSITION STATS STRIP */}
        <PosStatsStrip position={player.position} gwHistory={gwHistory} />

        {/* BODY */}
        <div style={{ flex:1, display:'flex', overflow:'hidden', minHeight:0 }}>

          {/* LEFT — GW table */}
          <div style={{ flex:'0 0 55%', borderRight:'1px solid var(--rule)', display:'flex', flexDirection:'column', overflow:'hidden' }}>
            <div style={{ ...MO, fontSize:9, color:'var(--mute)', padding:'8px 16px',
              borderBottom:'1px solid var(--rule)', flexShrink:0, letterSpacing:'.2em' }}>GW HISTORY</div>
            <div style={{ display:'grid', gridTemplateColumns:'44px 1fr 54px 36px 36px 50px',
              padding:'6px 16px', borderBottom:'1px solid var(--rule)',
              ...MO, fontSize:8, color:'var(--mute)', flexShrink:0 }}>
              <span>GW</span><span>FIXTURE</span><span>MIN</span>
              <span style={{ color:'var(--positive)' }}>G</span>
              <span style={{ color:'var(--cyan)' }}>A</span>
              <span style={{ textAlign:'right' }}>PTS</span>
            </div>
            <div style={{ flex:1, overflow:'auto' }}>
              {/* PLUGIN: map over player.gwHistory */}
              {gwHistory.map((r,i) => (
                <div key={i} onClick={() => setSel(r)} style={{
                  display:'grid', gridTemplateColumns:'44px 1fr 54px 36px 36px 50px',
                  padding:'10px 16px', borderBottom:'1px solid var(--rule)',
                  cursor:'pointer', alignItems:'center',
                  background:sel===r?'rgba(0,180,216,.07)':'transparent',
                  borderLeft:sel===r?'2px solid var(--cyan)':'2px solid transparent',
                }}>
                  <span style={{ ...MO, fontSize:9, color:'var(--mute)' }}>{r.gw}</span>
                  <span style={{ fontFamily:'Archivo', fontSize:12 }}>{r.fixture}{r.isHome?' (H)':' (A)'}</span>
                  <span style={{ ...MO, fontSize:9, color:'var(--mute)' }}>{r.minutes}'</span>
                  <span style={{ fontFamily:'Archivo Black', fontSize:14, color:r.goals>0?'var(--positive)':'var(--mute)' }}>{r.goals}</span>
                  <span style={{ fontFamily:'Archivo Black', fontSize:14, color:r.assists>0?'var(--cyan)':'var(--mute)' }}>{r.assists}</span>
                  <span style={{ textAlign:'right', fontFamily:'Archivo Black', fontSize:16, color:'var(--positive)' }}>{r.totalPts}</span>
                </div>
              ))}
              {!gwHistory.length && (
                <div style={{ padding:'18px 16px', ...MO, fontSize:9, color:'var(--mute)' }}>— NO GAMEWEEKS PLAYED —</div>
              )}
            </div>
            <div style={{ borderTop:'1px solid var(--rule)', padding:'10px 16px', flexShrink:0 }}>
              <div style={{ ...MO, fontSize:8, color:'var(--mute)', marginBottom:8, letterSpacing:'.2em' }}>POINTS HISTORY</div>
              <MiniChart history={gwHistory} />
            </div>
          </div>

          {/* RIGHT — point breakdown (for selected row) */}
          <div style={{ flex:1, display:'flex', flexDirection:'column', overflow:'hidden' }}>
            {/* breakdown header — clearly shows which fixture */}
            <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center',
              padding:'8px 16px', borderBottom:'1px solid var(--rule)', flexShrink:0 }}>
              <span style={{ ...MO, fontSize:9, color:'var(--mute)', letterSpacing:'.2em' }}>POINT BREAKDOWN</span>
              {sel ? (
                <div style={{ display:'flex', alignItems:'center', gap:8 }}>
                  {/* pill showing selected GW — reinforces the "per row" connection */}

      </div>
    </div>
  );
}

      </div>
    </div>

}
